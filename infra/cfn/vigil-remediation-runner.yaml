AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Customer-hosted Vigil remediation executor. Deploy once per account.
  Update the inline policy on RemediationRole to match the check you automate
  (see Vigil remediation dispatch response iam_inline_policy).

Parameters:
  RemediationRoleName:
    Type: String
    Default: VigilRemediationRole
  LambdaName:
    Type: String
    Default: VigilRemediationRunner
  EnableS3Remediation:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
  EnableEc2Remediation:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"

Conditions:
  S3Enabled: !Equals [!Ref EnableS3Remediation, "true"]
  Ec2Enabled: !Equals [!Ref EnableEc2Remediation, "true"]

Resources:
  RemediationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RemediationRoleName
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: VigilRemediationScoped
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - !If
                - S3Enabled
                - Sid: S3PublicAccessBlock
                  Effect: Allow
                  Action:
                    - s3:PutPublicAccessBlock
                    - s3:GetPublicAccessBlock
                    - s3:GetBucketLocation
                  Resource: "*"
                - !Ref AWS::NoValue
              - !If
                - Ec2Enabled
                - Sid: Ec2SecurityGroupIngress
                  Effect: Allow
                  Action:
                    - ec2:RevokeSecurityGroupIngress
                    - ec2:DescribeSecurityGroups
                  Resource: "*"
                - !Ref AWS::NoValue

  RemediationFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaName
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt RemediationRole.Arn
      Timeout: 120
      Code:
        ZipFile: |
          import json
          import boto3

          def _plan(event):
              detail = event.get("detail") or event
              if isinstance(detail, str):
                  detail = json.loads(detail)
              return detail

          def _bucket_from_plan(plan):
              arn = plan.get("resource_arn") or ""
              if arn.startswith("arn:aws:s3:::"):
                  return arn.split(":::")[-1].split("/")[0]
              return (plan.get("evidence") or {}).get("bucket_name")

          def _sg_from_plan(plan):
              ev = plan.get("evidence") or {}
              return ev.get("group_id") or (plan.get("resource_arn") or "").split("/")[-1]

          def handler(event, context):
              plan = _plan(event)
              check_id = plan.get("check_id")
              region = (plan.get("evidence") or {}).get("region") or "us-east-1"
              print("vigil remediation", plan.get("plan_id"), check_id, region)

              if check_id == "s3.bucket.public_access_not_blocked":
                  bucket = _bucket_from_plan(plan)
                  if not bucket:
                      return {"ok": False, "error": "missing bucket"}
                  boto3.client("s3").put_public_access_block(
                      Bucket=bucket,
                      PublicAccessBlockConfiguration={
                          "BlockPublicAcls": True,
                          "IgnorePublicAcls": True,
                          "BlockPublicPolicy": True,
                          "RestrictPublicBuckets": True,
                      },
                  )
                  return {"ok": True, "action": "put_public_access_block", "bucket": bucket}

              if check_id in ("ec2.security_group.unrestricted_ssh", "ec2.security_group.unrestricted_rdp"):
                  sg_id = _sg_from_plan(plan)
                  if not sg_id:
                      return {"ok": False, "error": "missing security group id"}
                  port = 22 if "ssh" in check_id else 3389
                  ec2 = boto3.client("ec2", region_name=region)
                  sg = ec2.describe_security_groups(GroupIds=[sg_id])["SecurityGroups"][0]
                  revoked = 0
                  for perm in sg.get("IpPermissions", []):
                      from_port = perm.get("FromPort")
                      to_port = perm.get("ToPort")
                      if from_port is None and to_port is None:
                          continue
                      if from_port is not None and from_port > port:
                          continue
                      if to_port is not None and to_port < port:
                          continue
                      for rng in perm.get("IpRanges", []):
                          if rng.get("CidrIp") in ("0.0.0.0/0",):
                              ec2.revoke_security_group_ingress(
                                  GroupId=sg_id,
                                  IpPermissions=[{
                                      "IpProtocol": perm.get("IpProtocol", "tcp"),
                                      "FromPort": from_port,
                                      "ToPort": to_port,
                                      "IpRanges": [{"CidrIp": "0.0.0.0/0"}],
                                  }],
                              )
                              revoked += 1
                      for rng in perm.get("Ipv6Ranges", []):
                          if rng.get("CidrIpv6") == "::/0":
                              ec2.revoke_security_group_ingress(
                                  GroupId=sg_id,
                                  IpPermissions=[{
                                      "IpProtocol": perm.get("IpProtocol", "tcp"),
                                      "FromPort": from_port,
                                      "ToPort": to_port,
                                      "Ipv6Ranges": [{"CidrIpv6": "::/0"}],
                                  }],
                              )
                              revoked += 1
                  return {"ok": True, "action": "revoke_open_ingress", "group_id": sg_id, "revoked": revoked}

              return {"ok": False, "error": f"unsupported check_id {check_id}"}

  RemediationInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RemediationFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt RemediationRule.Arn

  RemediationRule:
    Type: AWS::Events::Rule
    Properties:
      Name: VigilRemediationApproved
      EventPattern:
        source:
          - vigil.security
        detail-type:
          - vigil.remediation.approved
      State: ENABLED
      Targets:
        - Arn: !GetAtt RemediationFunction.Arn
          Id: VigilRemediationTarget

Outputs:
  RemediationRoleArn:
    Value: !GetAtt RemediationRole.Arn
  RemediationFunctionArn:
    Value: !GetAtt RemediationFunction.Arn
