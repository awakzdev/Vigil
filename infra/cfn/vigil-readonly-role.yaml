AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Vigil read-only IAM role for compliance scanning. Enumerates AWS config
  across IAM, account contacts (CIS 1.1/1.2), IAM server certificates (CIS 1.18),
  storage, compute, networking, and security services. No write access.
  Role retained on stack deletion — update the stack to pick up new read actions.

Parameters:
  VigilAccountPrincipal:
    Type: String
    Default: "arn:aws:iam::016266969060:role/VigilControlPlane"
    Description: ARN of the Vigil control plane principal (provided during onboarding).
  ExternalId:
    Type: String
    Description: Unique ExternalId issued at onboarding. Required to assume the role.
    NoEcho: true
  RoleName:
    Type: String
    Default: VigilReadOnly
    Description: IAM role name. Do not change on stack updates.
  EnableAccessAnalyzerMonitorRole:
    Type: String
    Default: "No"
    AllowedValues: ["Yes", "No"]
    Description: >
      Create a separate IAM role for IAM Access Analyzer policy generation (reads CloudTrail
      logs in S3). Optional — only needed for Vigil Advanced suggested-policy (ARN scope).
  CloudTrailLogsBucketName:
    Type: String
    Default: ""
    Description: >
      S3 bucket name where CloudTrail delivers logs (not ARN). Required when monitor role is Yes.
      For organization trails in another account, create the monitor role manually and grant
      bucket/KMS access there; leave this No.
  CloudTrailLogsBucketPrefix:
    Type: String
    Default: "AWSLogs/"
    Description: Optional key prefix under the bucket (include trailing slash if used).
  CloudTrailLogsKmsKeyArn:
    Type: String
    Default: ""
    Description: KMS key ARN if CloudTrail log objects are SSE-KMS encrypted (optional).

Conditions:
  CreateMonitorRole:
    Fn::And:
      - !Equals [!Ref EnableAccessAnalyzerMonitorRole, "Yes"]
      - !Not [!Equals [!Ref CloudTrailLogsBucketName, ""]]
  HasCloudTrailKmsKey: !Not [!Equals [!Ref CloudTrailLogsKmsKeyArn, ""]]

Resources:
  VigilRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RoleName: !Ref RoleName
      Description: Vigil read-only compliance scanner. No write access.
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref VigilAccountPrincipal
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      Policies:
        - PolicyName: VigilMinimalReadOnly
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: IamUserAndKeyEnumeration
                Effect: Allow
                Action:
                  - iam:ListUsers
                  - iam:ListMFADevices
                  - iam:GetLoginProfile
                  - iam:ListAccessKeys
                  - iam:GetAccessKeyLastUsed
                  - iam:GetAccountSummary
                  - iam:ListAccountAliases
                  - iam:GetAccountPasswordPolicy
                Resource: "*"

              - Sid: IamRoleEnumeration
                Effect: Allow
                Action:
                  - iam:ListRoles
                  - iam:ListRolePolicies
                  - iam:GetRolePolicy
                  - iam:ListAttachedRolePolicies
                  - iam:GetPolicy
                  - iam:GetPolicyVersion
                  - iam:ListPolicies
                Resource: "*"

              - Sid: IamServiceLastAccessed
                Effect: Allow
                Action:
                  - iam:GenerateServiceLastAccessedDetails
                  - iam:GetServiceLastAccessedDetails
                Resource: "*"

              - Sid: IamServerCertificates
                Effect: Allow
                Action:
                  - iam:ListServerCertificates
                  - iam:GetServerCertificate
                Resource: "*"

              - Sid: AccountContacts
                Effect: Allow
                Action:
                  - account:GetContactInformation
                  - account:GetAlternateContact
                Resource: "*"

              - Sid: S3BucketConfiguration
                Effect: Allow
                Action:
                  - s3:ListAllMyBuckets
                  - s3:GetAccountPublicAccessBlock
                  - s3:GetBucketLogging
                  - s3:GetEncryptionConfiguration
                  - s3:GetBucketVersioning
                  - s3:GetBucketPublicAccessBlock
                  - s3:GetBucketPolicy
                  - s3:GetBucketAcl
                Resource: "*"

              - Sid: KmsKeyConfiguration
                Effect: Allow
                Action:
                  - kms:ListKeys
                  - kms:DescribeKey
                  - kms:GetKeyRotationStatus
                  - kms:GetKeyPolicy
                  - kms:ListAliases
                Resource: "*"

              - Sid: CloudTrailConfiguration
                Effect: Allow
                Action:
                  - cloudtrail:DescribeTrails
                  - cloudtrail:GetTrailStatus
                  - cloudtrail:LookupEvents
                Resource: "*"

              - Sid: GuardDutyConfiguration
                Effect: Allow
                Action:
                  - guardduty:ListDetectors
                  - guardduty:GetDetector
                  - guardduty:ListFindings
                  - guardduty:GetFindings
                Resource: "*"

              - Sid: SecurityHubConfiguration
                Effect: Allow
                Action:
                  - securityhub:DescribeHub
                Resource: "*"

              - Sid: VpcAndSecurityGroupEnumeration
                Effect: Allow
                Action:
                  - ec2:DescribeRegions
                  - ec2:DescribeVpcs
                  - ec2:DescribeFlowLogs
                  - ec2:DescribeSecurityGroups
                Resource: "*"

              - Sid: Ec2InstanceEnumeration
                Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeVolumes
                  - ec2:DescribeSnapshots
                  - ec2:DescribeSnapshotAttribute
                  - ec2:DescribeImages
                  - ec2:GetEbsEncryptionByDefault
                Resource: "*"

              - Sid: AccessAnalyzerConfiguration
                Effect: Allow
                Action:
                  - access-analyzer:ListAnalyzers
                  - access-analyzer:StartPolicyGeneration
                  - access-analyzer:GetGeneratedPolicy
                  - access-analyzer:ListPolicyGenerations
                  - access-analyzer:CancelPolicyGeneration
                Resource: "*"

              - Sid: ConfigServiceConfiguration
                Effect: Allow
                Action:
                  - config:DescribeConfigurationRecorders
                  - config:DescribeConfigurationRecorderStatus
                  - config:DescribeDeliveryChannels
                  - config:DescribeComplianceByConfigRule
                Resource: "*"

              - Sid: IdentityCenterDirectory
                Effect: Allow
                Action:
                  - sso:ListInstances
                  - sso:DescribeInstance
                  - sso-admin:ListPermissionSets
                  - sso-admin:DescribePermissionSet
                  - identitystore:ListUsers
                  - identitystore:DescribeUser
                Resource: "*"

              - Sid: RdsConfiguration
                Effect: Allow
                Action:
                  - rds:DescribeDBInstances
                Resource: "*"

              - Sid: AcmCertificates
                Effect: Allow
                Action:
                  - acm:ListCertificates
                  - acm:DescribeCertificate
                Resource: "*"

              - Sid: LambdaConfiguration
                Effect: Allow
                Action:
                  - lambda:ListFunctions
                  - lambda:GetFunctionEventInvokeConfig
                Resource: "*"

              - Sid: SecretsManagerConfiguration
                Effect: Allow
                Action:
                  - secretsmanager:ListSecrets
                Resource: "*"

              - Sid: SsmParameters
                Effect: Allow
                Action:
                  - ssm:DescribeParameters
                Resource: "*"

              - Sid: ElbConfiguration
                Effect: Allow
                Action:
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeLoadBalancerAttributes
                  - elasticloadbalancing:DescribeListeners
                Resource: "*"

              - Sid: DynamoDbConfiguration
                Effect: Allow
                Action:
                  - dynamodb:ListTables
                  - dynamodb:DescribeTable
                  - dynamodb:DescribeContinuousBackups
                Resource: "*"

              - Sid: SnsConfiguration
                Effect: Allow
                Action:
                  - sns:ListTopics
                  - sns:GetTopicAttributes
                Resource: "*"

              - Sid: SqsConfiguration
                Effect: Allow
                Action:
                  - sqs:ListQueues
                  - sqs:GetQueueAttributes
                Resource: "*"

              - Sid: OrganizationsAccountLabel
                Effect: Allow
                Action:
                  - organizations:DescribeAccount
                Resource: "*"

  AccessAnalyzerMonitorRole:
    Type: AWS::IAM::Role
    Condition: CreateMonitorRole
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RoleName: !Sub "${RoleName}AccessAnalyzerMonitor"
      Description: >
        Lets IAM Access Analyzer read CloudTrail S3 logs for policy generation. Assumed by
        access-analyzer.amazonaws.com — not by Vigil directly.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: access-analyzer.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AccessAnalyzerCloudTrailRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              Fn::If:
                - HasCloudTrailKmsKey
                - - Sid: CloudTrailDiscovery
                    Effect: Allow
                    Action:
                      - cloudtrail:DescribeTrails
                      - cloudtrail:GetTrailStatus
                    Resource: "*"
                  - Sid: CloudTrailLogRead
                    Effect: Allow
                    Action:
                      - s3:GetObject
                      - s3:ListBucket
                    Resource:
                      - !Sub "arn:aws:s3:::${CloudTrailLogsBucketName}"
                      - !Sub "arn:aws:s3:::${CloudTrailLogsBucketName}/${CloudTrailLogsBucketPrefix}*"
                  - Sid: CloudTrailLogDecrypt
                    Effect: Allow
                    Action:
                      - kms:Decrypt
                      - kms:DescribeKey
                    Resource: !Ref CloudTrailLogsKmsKeyArn
                - - Sid: CloudTrailDiscovery
                    Effect: Allow
                    Action:
                      - cloudtrail:DescribeTrails
                      - cloudtrail:GetTrailStatus
                    Resource: "*"
                  - Sid: CloudTrailLogRead
                    Effect: Allow
                    Action:
                      - s3:GetObject
                      - s3:ListBucket
                    Resource:
                      - !Sub "arn:aws:s3:::${CloudTrailLogsBucketName}"
                      - !Sub "arn:aws:s3:::${CloudTrailLogsBucketName}/${CloudTrailLogsBucketPrefix}*"

Outputs:
  RoleArn:
    Description: Paste this ARN into Vigil to finish onboarding.
    Value: !GetAtt VigilRole.Arn
  ExternalId:
    Description: ExternalId required to assume the role.
    Value: !Ref ExternalId
  AccessAnalyzerMonitorRoleArn:
    Condition: CreateMonitorRole
    Description: >
      Pass to Vigil (Advanced policy generation). IAM Access Analyzer assumes this role to read
      CloudTrail logs — not the VigilReadOnly role.
    Value: !GetAtt AccessAnalyzerMonitorRole.Arn
