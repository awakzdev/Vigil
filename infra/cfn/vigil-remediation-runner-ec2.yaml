AWSTemplateFormatVersion: "2010-09-09"
Description: >
  EC2 security group remediation only (SSH/RDP). No S3.
  Source of truth for handler logic: infra/lambda/remediation_runner.py

Parameters:
  RemediationRoleName:
    Type: String
    Default: VigilRemediationRole
    Description: IAM role name (unique per account). Skip creating a new role if you pass ExistingRemediationRoleArn.
  LambdaName:
    Type: String
    Default: VigilRemediationRunner
  ExistingRemediationRoleArn:
    Type: String
    Default: ""
    Description: >
      Optional. If set (e.g. from an existing Vigil-Runner stack), do not create RemediationRole —
      only update Lambda + EventBridge. Example: arn:aws:iam::123456789012:role/VigilRemediationRole
  EventBusName:
    Type: String
    Default: default
    Description: Event bus where this stack is deployed (put-events must use this bus's region).
  RemediationSigningPublicKeyBase64:
    Type: String
    Default: ""
    Description: Optional Ed25519 public key from Vigil dispatch (verify signed plans).
  LambdaArtifactBucket:
    Type: String
    Default: vigil-worm-storage
    Description: S3 bucket with remediation_runner.zip (run infra/lambda/build.sh then upload).
  LambdaArtifactKey:
    Type: String
    Default: lambda/remediation_runner.zip
    Description: S3 key for packaged Lambda (canonical source infra/lambda/remediation_runner.py).
  VigilExecutionWebhookUrl:
    Type: String
    Default: ""
    Description: Optional Vigil API URL for execution callback (e.g. https://api.example.com/v1/public/remediation-execution).

Conditions:
  CreateRole: !Equals [!Ref ExistingRemediationRoleArn, ""]

Resources:
  RemediationDLQ:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600

  RemediationDLQPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref RemediationDLQ
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt RemediationDLQ.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Sub
                  - "arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:rule/${Bus}/${RuleName}"
                  - Bus: !Ref EventBusName
                    RuleName: VigilRemediationApproved

  RemediationRole:
    Condition: CreateRole
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RemediationRoleName
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: VigilRemediationEc2SecurityGroups
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: Ec2SecurityGroupIngress
                Effect: Allow
                Action:
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:DescribeSecurityGroups
                Resource: "*"
              - Sid: RemediationExecutionsDynamoDB
                Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                Resource: !GetAtt RemediationExecutionsTable.Arn

  RemediationExecutionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: VigilRemediationExecutions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: plan_id
          AttributeType: S
      KeySchema:
        - AttributeName: plan_id
          KeyType: HASH

  RemediationFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaName
      Runtime: python3.12
      Handler: index.handler
      Role: !If [CreateRole, !GetAtt RemediationRole.Arn, !Ref ExistingRemediationRoleArn]
      Timeout: 120
      ReservedConcurrentExecutions: 2
      Environment:
        Variables:
          REMEDIATION_SIGNING_PUBLIC_KEY_B64: !Ref RemediationSigningPublicKeyBase64
          VIGIL_EXECUTION_WEBHOOK_URL: !Ref VigilExecutionWebhookUrl
          REMEDIATION_EXECUTIONS_TABLE: !Ref RemediationExecutionsTable
      Code:
        S3Bucket: !Ref LambdaArtifactBucket
        S3Key: !Ref LambdaArtifactKey

  RemediationInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RemediationFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt RemediationRule.Arn

  RemediationLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${LambdaName}
      RetentionInDays: 30

  RemediationRule:
    Type: AWS::Events::Rule
    Properties:
      Name: VigilRemediationApproved
      EventBusName: !Ref EventBusName
      EventPattern:
        source:
          - vigil.security
        detail-type:
          - vigil.remediation.approved
        detail:
          schema:
            - vigil_remediation_plan/v2
          check_id:
            - ec2.security_group.unrestricted_ssh
            - ec2.security_group.unrestricted_rdp
          execution:
            runner_type:
              - lambda
      State: ENABLED
      Targets:
        - Arn: !GetAtt RemediationFunction.Arn
          Id: VigilRemediationTarget
          DeadLetterConfig:
            Arn: !GetAtt RemediationDLQ.Arn

Outputs:
  RemediationRoleArn:
    Value: !If [CreateRole, !GetAtt RemediationRole.Arn, !Ref ExistingRemediationRoleArn]
  RemediationFunctionArn:
    Value: !GetAtt RemediationFunction.Arn
  EventBusRegion:
    Value: !Ref AWS::Region
  RemediationExecutionsTableName:
    Value: !Ref RemediationExecutionsTable
  DeployNote:
    Value: >
      Deploy this stack in the region where you run aws events put-events (event bus home).
      Set VigilExecutionWebhookUrl to Vigil API /v1/public/remediation-execution. Upload Lambda zip to S3 first.
