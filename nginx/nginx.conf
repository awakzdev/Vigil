events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    server_tokens off;

    # HTTP → HTTPS redirect for all hosts
    server {
        listen 80;
        server_name vigil.cclab.cloud-castles.com api.vigil.cclab.cloud-castles.com;
        return 301 https://$host$request_uri;
    }

    # Frontend — vigil.cclab.cloud-castles.com
    server {
        listen 443 ssl;
        server_name vigil.cclab.cloud-castles.com;

        ssl_certificate     /etc/letsencrypt/live/vigil.cclab.cloud-castles.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vigil.cclab.cloud-castles.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass         http://web:5173;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # API — api.vigil.cclab.cloud-castles.com
    server {
        listen 443 ssl;
        server_name api.vigil.cclab.cloud-castles.com;

        ssl_certificate     /etc/letsencrypt/live/vigil.cclab.cloud-castles.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vigil.cclab.cloud-castles.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass         http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }
    }
}
