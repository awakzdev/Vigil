name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start Postgres and Redis
        run: docker compose up -d db redis

      - name: Run API tests
        run: |
          docker compose run --rm api alembic upgrade head
          docker compose run --rm api pytest -q
